name: Release

# Trips on tags like v0.1.0; builds release tarballs for every
# `[workspace.metadata.dist].targets` host and attaches them to the
# corresponding GitHub Release. The shell installer (so `curl | sh`
# works on macOS / Linux) and PowerShell installer (Windows) are
# generated by cargo-dist.
#
# Once cargo-dist is more deeply set up locally, run `cargo dist init`
# to refresh this file from the metadata block.

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  release:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
        # aarch64-unknown-linux-gnu is omitted from prebuilt binaries
        # because rmcp's transport-io feature transitively pulls
        # `native-tls` -> `openssl-sys`, which doesn't cross-compile
        # cleanly without setting up an aarch64 sysroot. Linux ARM64
        # users build from source: `cargo install lexa-obsidian`
        # works natively on those machines.
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build all shipping binaries
        shell: bash
        run: |
          cargo build --release \
            --target ${{ matrix.target }} \
            -p lexa -p lexa-mcp -p lexa-obsidian

      - name: Package
        id: package
        shell: bash
        run: |
          set -euo pipefail
          TARGET=${{ matrix.target }}
          VERSION=${GITHUB_REF_NAME#v}
          STAGE="lexa-${VERSION}-${TARGET}"
          mkdir -p "$STAGE"
          if [[ "$TARGET" == *windows* ]]; then
            cp target/${TARGET}/release/lexa.exe "$STAGE/"
            cp target/${TARGET}/release/lexa-mcp.exe "$STAGE/"
            cp target/${TARGET}/release/lexa-obsidian.exe "$STAGE/"
            cp target/${TARGET}/release/lexa-obsidian-mcp.exe "$STAGE/"
            cp README.md LICENSE-MIT LICENSE-APACHE "$STAGE/"
            7z a "${STAGE}.zip" "$STAGE"
            echo "asset=${STAGE}.zip" >> "$GITHUB_OUTPUT"
          else
            cp target/${TARGET}/release/lexa "$STAGE/"
            cp target/${TARGET}/release/lexa-mcp "$STAGE/"
            cp target/${TARGET}/release/lexa-obsidian "$STAGE/"
            cp target/${TARGET}/release/lexa-obsidian-mcp "$STAGE/"
            cp README.md LICENSE-MIT LICENSE-APACHE "$STAGE/"
            tar -czf "${STAGE}.tar.gz" "$STAGE"
            echo "asset=${STAGE}.tar.gz" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.asset }}
          generate_release_notes: true
          fail_on_unmatched_files: true
